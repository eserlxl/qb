name: validate

# This workflow mirrors the local gate of record documented in RUNBOOK.md and
# BASELINE.md. While cloud CI is disabled on the account, local `make check`
# remains authoritative; this workflow is not release confidence by itself.
# Least-privilege: the validation job only reads the repo and runs `make check`;
# it never writes contents, packages, or any other scope, and performs no push.
permissions:
  contents: read

# Cancel an in-progress validation when a newer commit lands on the same ref, so
# stale runs do not pile up.
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Python version matrix: the stdlib-only engine must validate clean on every
    # supported interpreter. fail-fast is disabled so one version's failure does not
    # cancel the others' diagnostics. Local `make check` (on the project's own
    # interpreter) stays the authoritative gate; this matrix is part of the mirror.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    # Pinning policy: major-version tags are broad refs that the offline analyzer
    # reports; full semver tags and immutable commit SHAs are the clean states.
    # This disabled mirror workflow keeps local `make check` authoritative. The
    # actions below are pinned to full commit SHAs (the floating # vN comment is
    # advisory, for Dependabot) so they pass QB's own broad-action-ref self-audit.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run monorepo validation
        run: make check
